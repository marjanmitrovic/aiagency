name: Remove trust bar section

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-trustbar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Remove trust bar block
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          start = s.find('    <section style="padding:18px 0 0; position:relative; z-index:1;">')
          if start == -1:
              print('Trust bar section already removed.')
          else:
              hero = s.find('    <section class="hero">', start)
              if hero == -1:
                  raise SystemExit('Hero section not found after trust bar.')
              s = s[:start] + s[hero:]
              p.write_text(s, encoding='utf-8')
              print('Trust bar section removed.')
          PY
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Remove trust bar from landing page"
            git push
          fi
